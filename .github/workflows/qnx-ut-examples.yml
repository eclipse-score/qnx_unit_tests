on:
  pull_request:
    types: [opened, reopened, synchronize]
  merge_group:
    types: [checks_requested]
jobs:
  workflow-approval:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    environment: workflow-approval
    steps:
      - run: echo "Workflow approved"
  qnx-ut-examples-build-all:
    needs: workflow-approval
    # yamlfmt inserts spurious blank lines in >- blocks, so keep this on one line
    if: ${{ !cancelled() && (needs.workflow-approval.result == 'success' || needs.workflow-approval.result == 'skipped') && (github.event_name == 'merge_group' || github.event.pull_request.head.repo.full_name == github.repository) }}
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    env:
      SCORE_QNX_USER: ${{ secrets.SCORE_QNX_USER }}
      SCORE_QNX_PASSWORD: ${{ secrets.SCORE_QNX_PASSWORD }}
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.14.0
      - name: Setup QNX License
        env:
          SCORE_QNX_LICENSE: ${{ secrets.SCORE_QNX_LICENSE }}
        run: |
          mkdir -p /opt/score_qnx/license
          echo "${SCORE_QNX_LICENSE}" | base64 --decode > /opt/score_qnx/license/licenses
      - name: Install qemu
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system
      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Allow unprivileged user namespaces
        run: |
          sudo sysctl kernel.apparmor_restrict_unprivileged_userns=0
      - name: Build and test
        run: |
          bazel test --config=qnx-x86_64 //test/...
          bazel test --config=run-under-qnx-x86_64 //test/...
          bazel test --config=qnx-aarch64 //test/...
          bazel test --config=run-under-qnx-aarch64 //test/...
      - name: Build and test examples
        run: |
          cd ./examples
          bazel test --config=qnx-x86_64 //...
          bazel test --config=run-under-qnx-x86_64 //...
          bazel test --config=qnx-aarch64 //...
          bazel test --config=run-under-qnx-aarch64 //...
      - name: Cleanup QNX License
        if: always()
        run: |
          rm -rf /opt/score_qnx
          rm -rf "${HOME}/.cache/bazel"
